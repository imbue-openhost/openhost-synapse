[app]
name = "synapse"
version = "0.2.0"
description = "Matrix Synapse homeserver with MAS (matrix-authentication-service) for OIDC/OAuth2"

[runtime.container]
image = "Dockerfile"
port = 3000

[routing]
public_paths = [
    "/_matrix/",
    "/_synapse/client/",
    "/.well-known/matrix/",
    "/.well-known/openid-configuration",
    "/oauth2/",
    "/login",
    "/logout",
    "/account/",
    "/api/graphql",
]

[resources]
# Increased for PostgreSQL (MAS), MAS server, and Synapse running simultaneously
memory_mb = 3072
cpu_millicores = 2000

[data]
app_data = true
