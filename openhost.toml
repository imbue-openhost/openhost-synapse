[app]
name = "synapse"
version = "0.1.0"
description = "Matrix Synapse homeserver - decentralized, encrypted communication"

[runtime.container]
image = "Dockerfile"
port = 3000

[routing]
public_paths = [
    "/_matrix/",
    "/_synapse/client/",
    "/.well-known/matrix/",
]

[[links]]
name = "admin"
path = "/_openhost/admin"

[resources]
memory_mb = 2048
cpu_millicores = 2000

[data]
app_data = true
